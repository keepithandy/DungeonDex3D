kind = "web"
previewPath = "/"
title = "DungeonDex3D"
version = "1.0.0"
id = "dungeondex3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24982

[services.development]
run = "pnpm run dev"

[services.production]
build = [ "pnpm", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24982"
BASE_PATH = "/"
