name: Alpha Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Encounter clarity smoke
        run: pnpm run smoke:encounter-clarity

      - name: Alpha hardening smoke
        run: pnpm run smoke:alpha

      - name: TypeScript check
        run: pnpm run typecheck

      - name: Production build
        run: pnpm run build
